<!DOCTYPE html><html lang="ko"> <head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>문의 | AKOMARO</title><meta name="description" content="Submit wholesale, partnership, or brand enquiry."><link rel="canonical" href="https://magazine.akomaro.com/ko/enquiry/"><meta property="og:type" content="website"><meta property="og:site_name" content="AKOMARO Magazine"><meta property="og:title" content="문의 | AKOMARO"><meta property="og:description" content="Submit wholesale, partnership, or brand enquiry."><meta property="og:url" content="https://magazine.akomaro.com/ko/enquiry/"><meta property="og:image" content="https://magazine.akomaro.com/images/og-default.svg"><meta name="twitter:card" content="summary_large_image"><meta name="twitter:title" content="문의 | AKOMARO"><meta name="twitter:description" content="Submit wholesale, partnership, or brand enquiry."><meta name="twitter:image" content="https://magazine.akomaro.com/images/og-default.svg"><link rel="stylesheet" href="/_astro/_slug_.BLkehbdh.css"></head> <body> <header class="site-header"> <div class="container" style="display:flex;justify-content:space-between;align-items:center;gap:20px;flex-wrap:wrap;"> <a class="brand" href="/ko/">AKOMARO Magazine</a> <nav style="display:flex;gap:16px;flex-wrap:wrap;"> <a href="/ko/">홈</a> <a href="/ko/brands/">브랜드</a> <a href="/ko/category/all">기사</a> <a href="/ko/enquiry/">문의</a> </nav> </div> </header> <main>  <section class="container" style="padding:32px 0;"> <h1>문의</h1> <form id="enquiry-form" class="card-body" style="max-width:720px;"> <input name="name" placeholder="이름" required> <input name="email" type="email" placeholder="이메일" required> <input name="company" placeholder="회사명"> <input name="country" placeholder="국가 / 지역"> <input name="brand_slug" placeholder="브랜드 슬러그"> <input name="interest_type" placeholder="문의 유형"> <textarea name="message" placeholder="메시지" rows="6"></textarea> <button type="submit">제출</button> <p id="form-status"></p> </form> </section> <script>(function(){const endpoint = "YOUR_APPS_SCRIPT_WEB_APP_URL";
const lang = "ko";
const successText = "제출되었습니다.";
const failText = "제출에 실패했습니다.";

    const form = document.getElementById("enquiry-form");
    const status = document.getElementById("form-status");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const formData = new FormData(form);
      const payload = Object.fromEntries(formData.entries());
      payload.lang = lang;
      payload.source = "website";
      payload.page_url = window.location.href;

      try {
        const res = await fetch(endpoint, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        const json = await res.json();
        status.textContent = json.ok ? successText : failText;
      } catch (err) {
        status.textContent = failText;
      }
    });
  })();</script>  </main> <footer class="site-footer"> <div class="container" style="display:flex;justify-content:space-between;align-items:center;gap:20px;flex-wrap:wrap;"> <p>AKOMARO Magazine — 유럽의 엄선된 브랜드, 스토리, 컬렉션.</p> <a href="/ko/enquiry/">문의하기</a> </div> </footer> </body></html>
