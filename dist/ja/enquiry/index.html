<!DOCTYPE html><html lang="ja"> <head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>お問い合わせ | AKOMARO</title><meta name="description" content="Submit wholesale, partnership, or brand enquiry."><link rel="canonical" href="https://magazine.akomaro.com/ja/enquiry/"><meta property="og:type" content="website"><meta property="og:site_name" content="AKOMARO Magazine"><meta property="og:title" content="お問い合わせ | AKOMARO"><meta property="og:description" content="Submit wholesale, partnership, or brand enquiry."><meta property="og:url" content="https://magazine.akomaro.com/ja/enquiry/"><meta property="og:image" content="https://magazine.akomaro.com/images/og-default.svg"><meta name="twitter:card" content="summary_large_image"><meta name="twitter:title" content="お問い合わせ | AKOMARO"><meta name="twitter:description" content="Submit wholesale, partnership, or brand enquiry."><meta name="twitter:image" content="https://magazine.akomaro.com/images/og-default.svg"><link rel="stylesheet" href="/_astro/_slug_.BLkehbdh.css"></head> <body> <header class="site-header"> <div class="container" style="display:flex;justify-content:space-between;align-items:center;gap:20px;flex-wrap:wrap;"> <a class="brand" href="/ja/">AKOMARO Magazine</a> <nav style="display:flex;gap:16px;flex-wrap:wrap;"> <a href="/ja/">ホーム</a> <a href="/ja/brands/">ブランド</a> <a href="/ja/category/all">記事</a> <a href="/ja/enquiry/">お問い合わせ</a> </nav> </div> </header> <main>  <section class="container" style="padding:32px 0;"> <h1>お問い合わせ</h1> <form id="enquiry-form" class="card-body" style="max-width:720px;"> <input name="name" placeholder="お名前" required> <input name="email" type="email" placeholder="メール" required> <input name="company" placeholder="会社名"> <input name="country" placeholder="国 / 地域"> <input name="brand_slug" placeholder="ブランドスラッグ"> <input name="interest_type" placeholder="お問い合わせ種別"> <textarea name="message" placeholder="メッセージ" rows="6"></textarea> <button type="submit">送信</button> <p id="form-status"></p> </form> </section> <script>(function(){const endpoint = "YOUR_APPS_SCRIPT_WEB_APP_URL";
const lang = "ja";
const successText = "送信されました。";
const failText = "送信に失敗しました。";

    const form = document.getElementById("enquiry-form");
    const status = document.getElementById("form-status");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const formData = new FormData(form);
      const payload = Object.fromEntries(formData.entries());
      payload.lang = lang;
      payload.source = "website";
      payload.page_url = window.location.href;

      try {
        const res = await fetch(endpoint, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        const json = await res.json();
        status.textContent = json.ok ? successText : failText;
      } catch (err) {
        status.textContent = failText;
      }
    });
  })();</script>  </main> <footer class="site-footer"> <div class="container" style="display:flex;justify-content:space-between;align-items:center;gap:20px;flex-wrap:wrap;"> <p>AKOMARO Magazine — ヨーロッパの厳選ブランド、ストーリー、コレクション。</p> <a href="/ja/enquiry/">お問い合わせ</a> </div> </footer> </body></html>
