<!DOCTYPE html><html lang="zh-hk"> <head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>查詢 | AKOMARO</title><meta name="description" content="Submit wholesale, partnership, or brand enquiry."><link rel="canonical" href="https://magazine.akomaro.com/zh-hk/enquiry/"><meta property="og:type" content="website"><meta property="og:site_name" content="AKOMARO Magazine"><meta property="og:title" content="查詢 | AKOMARO"><meta property="og:description" content="Submit wholesale, partnership, or brand enquiry."><meta property="og:url" content="https://magazine.akomaro.com/zh-hk/enquiry/"><meta property="og:image" content="https://magazine.akomaro.com/images/og-default.svg"><meta name="twitter:card" content="summary_large_image"><meta name="twitter:title" content="查詢 | AKOMARO"><meta name="twitter:description" content="Submit wholesale, partnership, or brand enquiry."><meta name="twitter:image" content="https://magazine.akomaro.com/images/og-default.svg"><link rel="stylesheet" href="/_astro/_slug_.BLkehbdh.css"></head> <body> <header class="site-header"> <div class="container" style="display:flex;justify-content:space-between;align-items:center;gap:20px;flex-wrap:wrap;"> <a class="brand" href="/zh-hk/">AKOMARO Magazine</a> <nav style="display:flex;gap:16px;flex-wrap:wrap;"> <a href="/zh-hk/">首頁</a> <a href="/zh-hk/brands/">品牌</a> <a href="/zh-hk/category/all">文章</a> <a href="/zh-hk/enquiry/">查詢</a> </nav> </div> </header> <main>  <section class="container" style="padding:32px 0;"> <h1>查詢</h1> <form id="enquiry-form" class="card-body" style="max-width:720px;"> <input name="name" placeholder="姓名" required> <input name="email" type="email" placeholder="電郵" required> <input name="company" placeholder="公司"> <input name="country" placeholder="國家 / 地區"> <input name="brand_slug" placeholder="品牌代號"> <input name="interest_type" placeholder="查詢類型"> <textarea name="message" placeholder="留言內容" rows="6"></textarea> <button type="submit">提交</button> <p id="form-status"></p> </form> </section> <script>(function(){const endpoint = "YOUR_APPS_SCRIPT_WEB_APP_URL";
const lang = "zh-hk";
const successText = "已成功提交。";
const failText = "提交失敗。";

    const form = document.getElementById("enquiry-form");
    const status = document.getElementById("form-status");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const formData = new FormData(form);
      const payload = Object.fromEntries(formData.entries());
      payload.lang = lang;
      payload.source = "website";
      payload.page_url = window.location.href;

      try {
        const res = await fetch(endpoint, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        const json = await res.json();
        status.textContent = json.ok ? successText : failText;
      } catch (err) {
        status.textContent = failText;
      }
    });
  })();</script>  </main> <footer class="site-footer"> <div class="container" style="display:flex;justify-content:space-between;align-items:center;gap:20px;flex-wrap:wrap;"> <p>AKOMARO Magazine — 精選歐洲品牌、故事與產品系列。</p> <a href="/zh-hk/enquiry/">聯絡我們</a> </div> </footer> </body></html>
